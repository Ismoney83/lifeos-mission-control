name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - name: Build
        env:
          VITE_LIFEOS_URL: ${{ secrets.VITE_LIFEOS_URL }}
          VITE_LIFEOS_KEY: ${{ secrets.VITE_LIFEOS_KEY }}
          VITE_OVB_URL: ${{ secrets.VITE_OVB_URL }}
          VITE_OVB_KEY: ${{ secrets.VITE_OVB_KEY }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
